[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Webserver
http_interface = 0.0.0.0
http_port = 8069
proxy_mode = True

; Security
admin_passwd = bptz-dskh-cec4

; Database
db_host = odoo-db
db_port = 5432
db_maxconn = 64

; Performance (pas aan op basis van load)
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = warn
logfile = /var/log/odoo/odoo.log
